services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - delka

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: php artisan queue:work database --queue=provisioning,mail,default --sleep=1 --tries=3 --timeout=90 --max-time=3600
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - delka

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: delka_estamparia
      MYSQL_USER: delka
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - delka-mysql:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - delka

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    networks:
      - delka

  node:
    image: node:22-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    profiles: ["tools"]

networks:
  delka:
    driver: bridge

volumes:
  delka-mysql:
